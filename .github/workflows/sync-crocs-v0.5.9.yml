name: Sync crocs v0.5.9

on:
  push:
    branches:
      - agent/dr-martens-v0.5.7-sync
    paths:
      - data/staging_crocs_v0.5.9.json
      - data/sync_crocs_v0.5.9.py
      - .github/workflows/sync-crocs-v0.5.9.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/dr-martens-v0.5.7-sync
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Merge and validate crocs data
        run: |
          python3 data/sync_crocs_v0.5.9.py
          python3 -m json.tool data/models.json >/dev/null
          python3 -m json.tool data/aliases.json >/dev/null
          python3 -m json.tool data/search_keywords.json >/dev/null
          cmp data/models.json app/assets/data/models.json
          cmp data/aliases.json app/assets/data/aliases.json
          cmp data/search_keywords.json app/assets/data/search_keywords.json
      - name: Commit generated masters
        run: |
          if git diff --quiet -- data/models.json data/aliases.json data/search_keywords.json app/assets/data/models.json app/assets/data/aliases.json app/assets/data/search_keywords.json; then
            echo 'No generated changes'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/models.json data/aliases.json data/search_keywords.json app/assets/data/models.json app/assets/data/aliases.json app/assets/data/search_keywords.json
          git commit -m 'data: sync audited crocs masters v0.5.9'
          git push origin HEAD:agent/dr-martens-v0.5.7-sync
