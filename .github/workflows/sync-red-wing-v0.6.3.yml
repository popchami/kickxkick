name: Sync RED WING v0.6.3

on:
  push:
    branches:
      - agent/dr-martens-v0.5.7-sync
    paths:
      - data/staging_red_wing_v0.6.3.json
      - data/sync_red_wing_v0.6.3.py
      - .github/workflows/sync-red-wing-v0.6.3.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/dr-martens-v0.5.7-sync
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Merge and validate RED WING data
        run: |
          python3 data/sync_red_wing_v0.6.3.py
          python3 -m json.tool data/models.json >/dev/null
          python3 -m json.tool data/aliases.json >/dev/null
          python3 -m json.tool data/search_keywords.json >/dev/null
          cmp data/models.json app/assets/data/models.json
          cmp data/aliases.json app/assets/data/aliases.json
          cmp data/search_keywords.json app/assets/data/search_keywords.json
          grep -F '| RED WING | PASS 6 | PASS | PASS | PASS | PASS |' specs/MODEL_MASTER_COVERAGE.md
      - name: Commit generated data and docs
        run: |
          paths='data/models.json data/aliases.json data/search_keywords.json app/assets/data/models.json app/assets/data/aliases.json app/assets/data/search_keywords.json data/README.md data/validation_rules.md data/CHANGELOG.md specs/MODEL_MASTER_COVERAGE.md specs/KICKXKICK_TASK_BOARD.md'
          if git diff --quiet -- $paths; then
            echo 'No generated changes'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add $paths
          git commit -m 'data: sync audited RED WING masters v0.6.3'
          git push origin HEAD:agent/dr-martens-v0.5.7-sync
